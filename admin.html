<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Tool Builder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #f7f7f7;
            color: #222;
        }

        h1 {
            margin-top: 0;
        }

        .section {
            background: white;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="url"],
        textarea {
            width: 100%;
            box-sizing: border-box;
            margin-top: 6px;
            padding: 10px;
            font-size: 1rem;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
            font-family: Arial, sans-serif;
        }

        button {
            padding: 12px 18px;
            font-size: 1rem;
            border: none;
            background: #2e7d32;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: #256a2a;
        }

        .output {
            margin-top: 15px;
        }

        .output textarea {
            min-height: 120px;
            font-family: monospace;
        }

        .small {
            color: #666;
            font-size: 0.95rem;
        }

        a.generated-link {
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>Email Tool Builder</h1>
    <p class="small">
        Fill in the fields below, then generate a shareable link to your email tool.
    </p>

    <div class="section">
        <h2>Page content</h2>

        <label for="baseUrl">Base URL of your public tool page</label>
        <input type="url" id="baseUrl" placeholder="https://yourusername.github.io/yourrepo/index.html">

        <label for="pageTitle">Browser tab title</label>
        <input type="text" id="pageTitle" placeholder="Mayor Fiaz: Meet with local Gypsy and Traveller families NOW!">

        <label for="heading">Main heading</label>
        <input type="text" id="heading" placeholder="Mayor Fiaz: Meet with local Gypsy and Traveller families NOW!">

        <label for="intro">Intro paragraph</label>
        <textarea id="intro" placeholder="Write the explanatory text shown above the form"></textarea>

        <label for="logoUrl">Logo image URL</label>
        <input type="url" id="logoUrl" placeholder="https://example.com/logo.png">

        <label for="backgroundImageUrl">Background image URL</label>
        <input type="url" id="backgroundImageUrl" placeholder="https://example.com/background.jpg">

        <label for="namePlaceholder">Name field placeholder</label>
        <input type="text" id="namePlaceholder" value="Enter your name">

        <label for="buttonText">Button text</label>
        <input type="text" id="buttonText" value="Send Email">
    </div>

    <div class="section">
        <h2>Email settings</h2>

        <label for="toEmail">To</label>
        <input type="text" id="toEmail" placeholder="mayor@newham.gov.uk">

        <label for="ccEmail">CC</label>
        <input type="text" id="ccEmail" placeholder="newham-leytonstone@londonrentersunion.org">

        <label for="bccEmail">BCC</label>
        <input type="text" id="bccEmail" placeholder="">

        <label for="subject">Email subject</label>
        <input type="text" id="subject" placeholder="Mayor Fiaz: Meet with local Gypsy and Traveller families NOW!">

        <label for="emailBody">Email body</label>
        <textarea id="emailBody" placeholder="Paste the full email body here"></textarea>
    </div>

    <div class="section">
        <button id="generateBtn">Generate Email Tool Link</button>

        <div class="output" id="output" style="display:none;">
            <label for="generatedLink">Generated link</label>
            <textarea id="generatedLink" readonly></textarea>

            <p>
                <a id="openLink" class="generated-link" href="#" target="_blank" rel="noopener noreferrer">Open generated email tool</a>
            </p>
        </div>
    </div>

    <script>
        function encodeConfig(config) {
            const json = JSON.stringify(config);
            return btoa(unescape(encodeURIComponent(json)));
        }

        document.getElementById('generateBtn').addEventListener('click', () => {
            const config = {
                pageTitle: document.getElementById('pageTitle').value.trim(),
                heading: document.getElementById('heading').value.trim(),
                intro: document.getElementById('intro').value,
                logoUrl: document.getElementById('logoUrl').value.trim(),
                backgroundImageUrl: document.getElementById('backgroundImageUrl').value.trim(),
                namePlaceholder: document.getElementById('namePlaceholder').value.trim(),
                buttonText: document.getElementById('buttonText').value.trim(),
                toEmail: document.getElementById('toEmail').value.trim(),
                ccEmail: document.getElementById('ccEmail').value.trim(),
                bccEmail: document.getElementById('bccEmail').value.trim(),
                subject: document.getElementById('subject').value.trim(),
                emailBody: document.getElementById('emailBody').value
            };

            const baseUrl = document.getElementById('baseUrl').value.trim();
            if (!baseUrl) {
                alert('Please enter the base URL for your public tool page.');
                return;
            }

            const encoded = encodeConfig(config);
            const fullLink = `${baseUrl}#data=${encoded}`;

            document.getElementById('generatedLink').value = fullLink;
            document.getElementById('openLink').href = fullLink;
            document.getElementById('output').style.display = 'block';
        });
    </script>
</body>
</html>
