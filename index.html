<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Tool</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

    <style>
        @font-face {
            font-family: "Trim Poster";
            font-display: swap;
            src: url("./TrimPosterRegular.otf") format("opentype");
        }

        @font-face {
            font-family: "Circular Std medium";
            font-display: swap;
            src: url("./CircularStd-Medium.otf") format("opentype");
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background:
                linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)),
                url('https://pbs.twimg.com/media/FE-ZJDbXsAc9IPZ?format=jpg&name=large') no-repeat center center fixed;
            background-size: cover;
        }

        header {
            width: 100%;
            text-align: center;
            margin: 20px 0;
        }

        header img {
            max-width: 200px;
            height: auto;
        }

        main {
            max-width: 600px;
            margin: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: calc(100% - 40px);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #333;
            font-family: 'Trim Poster', Arial, sans-serif;
            margin-top: 0;
        }

        p, .error-box {
            font-family: 'Circular Std medium', Arial, sans-serif;
        }

        p {
            font-size: 1em;
            line-height: 1.5;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type="text"] {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            max-width: 400px;
            font-size: 1em;
            box-sizing: border-box;
            font-family: 'Circular Std medium', Arial, sans-serif;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            color: white;
            background-color: #4CAF50;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Circular Std medium', Arial, sans-serif;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background-color: #45a049;
        }

        .hidden {
            display: none !important;
        }

        .error-box {
            margin-top: 16px;
            padding: 12px;
            background: #ffe8e8;
            color: #8b0000;
            border: 1px solid #d88;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <img
            src="https://londonrentersunion.org/wp-content/uploads/2018/05/lru-logo-from-eps.png"
            alt="London Renters Union Logo"
        >
    </header>

    <main>
        <h1 id="heading">Email Tool</h1>
        <p id="intro">This page has not been configured yet.</p>

        <form id="email-form">
            <input
                type="text"
                id="name"
                placeholder="Enter your name"
                required
            >

            <input
                type="text"
                id="postcode"
                placeholder="Enter your postcode"
                class="hidden"
            >

            <button type="submit" id="submit-button" disabled>Send Email</button>
        </form>

        <div id="error-box" class="error-box hidden"></div>
    </main>

    <script>
        function showError(message) {
            const errorBox = document.getElementById('error-box');
            errorBox.textContent = message;
            errorBox.classList.remove('hidden');
        }

        function getConfigFromUrl() {
            const hash = window.location.hash.startsWith('#')
                ? window.location.hash.slice(1)
                : window.location.hash;

            const params = new URLSearchParams(hash);
            const compressed = params.get('data');

            if (!compressed) {
                return null;
            }

            try {
                const json = LZString.decompressFromEncodedURIComponent(compressed);
                if (!json) return null;
                return JSON.parse(json);
            } catch (err) {
                console.error(err);
                return null;
            }
        }

        function applyConfig(config) {
            const defaults = {
                heading: 'Email Tool',
                intro: '',
                namePlaceholder: 'Enter your name',
                postcodePlaceholder: 'Enter your postcode',
                buttonText: 'Send Email',
                toEmail: '',
                ccEmail: '',
                bccEmail: '',
                subject: '',
                emailBody: '',
                askPostcode: false
            };

            const cfg = { ...defaults, ...config };

            document.title = cfg.heading || 'Email Tool';
            document.getElementById('heading').textContent = cfg.heading;
            document.getElementById('intro').textContent = cfg.intro;
            document.getElementById('name').placeholder = cfg.namePlaceholder;
            document.getElementById('submit-button').textContent = cfg.buttonText;

            const postcodeInput = document.getElementById('postcode');
            if (cfg.askPostcode) {
                postcodeInput.classList.remove('hidden');
                postcodeInput.placeholder = cfg.postcodePlaceholder;
                postcodeInput.required = true;
            }

            return cfg;
        }

        function normaliseEmailList(value) {
            return (value || '')
                .split(/[;,]/)
                .map(part => part.trim())
                .filter(Boolean)
                .join(',');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const config = getConfigFromUrl();

            if (!config) {
                showError('No valid configuration was found in the URL.');
                return;
            }

            const cfg = applyConfig(config);

            const nameInput = document.getElementById('name');
            const postcodeInput = document.getElementById('postcode');
            const submitButton = document.getElementById('submit-button');
            const form = document.getElementById('email-form');

            function updateButtonState() {
                const hasName = !!nameInput.value.trim();
                const hasPostcode = !cfg.askPostcode || !!postcodeInput.value.trim();
                submitButton.disabled = !(hasName && hasPostcode);
            }

            nameInput.addEventListener('input', updateButtonState);
            postcodeInput.addEventListener('input', updateButtonState);

            form.addEventListener('submit', (event) => {
                event.preventDefault();

                const name = nameInput.value.trim();
                const postcode = postcodeInput.value.trim();

                let emailBody = (cfg.emailBody || '').replace(/\s+$/, '');

                if (emailBody) {
                    emailBody += '\n';
                }

                emailBody += name;

                if (cfg.askPostcode) {
                    emailBody += `\n${postcode}`;
                }

                const queryParts = [];
                
                const toEmail = normaliseEmailList(cfg.toEmail);
                const ccEmail = normaliseEmailList(cfg.ccEmail);
                const bccEmail = normaliseEmailList(cfg.bccEmail);
                
                if (ccEmail) {
                    queryParts.push(`cc=${encodeURIComponent(ccEmail)}`);
                }
                if (bccEmail) {
                    queryParts.push(`bcc=${encodeURIComponent(bccEmail)}`);
                }
                if (cfg.subject) {
                    queryParts.push(`subject=${encodeURIComponent(cfg.subject)}`);
                }
                
                queryParts.push(`body=${encodeURIComponent(emailBody)}`);
                
                const mailtoLink =
                    `mailto:${encodeURIComponent(toEmail)}` +
                    (queryParts.length ? `?${queryParts.join('&')}` : '');
                
                window.location.href = mailtoLink;
            });

            updateButtonState();
        });
    </script>
</body>
</html>
